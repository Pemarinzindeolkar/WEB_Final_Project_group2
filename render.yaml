services:
  - type: web
    name: library-booking-system
    runtime: node
    repo: https://github.com/YOUR_USERNAME/YOUR_REPO_NAME
    plan: free
    envVars:
      - key: NODE_VERSION
        value: 20.20.2
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    branch: main
