<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Library Booking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Admin Portal</h1>
            <a href="index.html" class="back-btn">← Back</a>
        </div>
        
        <div id="loginSection" class="login-section">
            <h2>Admin Login</h2>
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="adminUsername" placeholder="Enter username">
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="adminPassword" placeholder="Enter password">
            </div>
            <button onclick="adminLogin()" class="btn-primary">Login</button>
            <div class="demo-credentials">
                <p>Demo Credentials: <strong>admin / admin123</strong></p>
            </div>
        </div>
        
        <div id="adminPanel" style="display:none;">
            <div class="admin-header">
                <h2>Welcome, <span id="adminName"></span></h2>
                <button onclick="adminLogout()" class="btn-danger">Logout</button>
            </div>
            
            <div class="statistics" id="statistics"></div>
            
            <div class="legend">
                <div class="legend-item">
                    <div class="seat-status available"></div>
                    <span>Available</span>
                </div>
                <div class="legend-item">
                    <div class="seat-status booked"></div>
                    <span>Booked</span>
                </div>
                <div class="legend-item">
                    <div class="seat-status reached"></div>
                    <span>Reached</span>
                </div>
            </div>
            
            <div id="adminSeatsContainer" class="seats-container"></div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
