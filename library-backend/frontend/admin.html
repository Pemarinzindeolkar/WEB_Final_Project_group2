<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Library Booking</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-box {
            background: linear-gradient(135deg, #4A90E2 0%, #87CEEB 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-box.available {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
        }
        .stat-box.booked {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
        .stat-number {
            font-size: 28px;
            font-weight: bold;
        }
        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            opacity: 0.9;
        }
        .booking-details {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
        }
        .booking-info {
            background: #f8f9fa;
            padding: 8px;
            margin-top: 8px;
            border-radius: 6px;
        }
        .admin-buttons {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }
        .btn-small {
            padding: 4px 10px;
            font-size: 11px;
            margin: 0;
        }
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Admin Portal</h1>
            <button onclick="goBack()" class="back-btn">← Back</button>
        </div>

        <div id="loginForm" class="form-container">
            <h2>Admin Login</h2>
            <input type="text" id="adminUsername" placeholder="Username" required>
            <input type="password" id="adminPassword" placeholder="Password" required>
            <button onclick="adminLogin()" class="btn-primary">Login</button>
            <p class="demo-note">Demo: admin / admin123</p>
        </div>

        <div id="adminPanel" style="display:none;">
            <div class="admin-header">
                <h2>Welcome, <span id="adminName"></span></h2>
                <button onclick="adminLogout()" class="btn-danger">Logout</button>
            </div>

            <div id="adminStats" class="admin-stats"></div>

            <div class="admin-controls">
                <button onclick="loadAllSeats()" class="btn-primary">View All Seats</button>
                <button onclick="loadAllBookings()" class="btn-primary">View All Bookings</button>
                <button onclick="loadStatistics()" class="btn-primary">Refresh Statistics</button>
            </div>

            <div class="filter-controls">
                <label>Filter by Floor:</label>
                <select id="floorFilter" onchange="filterSeatsByFloor()">
                    <option value="all">All Floors</option>
                    <option value="1">Ground Floor</option>
                    <option value="2">First Floor</option>
                </select>
            </div>

            <div id="seatsContainer"></div>
            <div id="bookingsContainer" class="bookings-container" style="display:none;"></div>
        </div>
    </div>

    <div id="message" class="message"></div>

    <script>
        let adminLoggedIn = false;
        let allSeatsData = [];

        function goBack() {
            window.history.back();
        }

        function showMessage(msg, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = msg;
            msgDiv.className = 'message ' + type;
            msgDiv.style.display = 'block';
            setTimeout(() => { msgDiv.style.display = 'none'; }, 4000);
        }

        async function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (!username || !password) {
                showMessage('Please enter username and password', 'error');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    adminLoggedIn = true;
                    document.getElementById('loginForm').style.display = 'none';
                    document.getElementById('adminPanel').style.display = 'block';
                    document.getElementById('adminName').textContent = data.admin.full_name || data.admin.username;
                    loadStatistics();
                    loadAllSeats();
                } else {
                    showMessage('Login failed: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error logging in: ' + error.message, 'error');
            }
        }

        function adminLogout() {
            adminLoggedIn = false;
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('adminPanel').style.display = 'none';
            showMessage('Logged out successfully', 'success');
        }

        async function loadStatistics() {
            try {
                const response = await fetch('/api/admin/statistics');
                const data = await response.json();
                
                document.getElementById('adminStats').innerHTML = `
                    <div class="stat-box">
                        <div class="stat-number">${data.total_seats}</div>
                        <div class="stat-label">Total Seats</div>
                    </div>
                    <div class="stat-box available">
                        <div class="stat-number">${data.available_seats}</div>
                        <div class="stat-label">Available</div>
                    </div>
                    <div class="stat-box booked">
                        <div class="stat-number">${data.booked_seats}</div>
                        <div class="stat-label">Booked</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${data.active_bookings}</div>
                        <div class="stat-label">Active Bookings</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${data.total_students}</div>
                        <div class="stat-label">Total Students</div>
                    </div>
                `;
            } catch (error) {
                console.error('Error loading statistics:', error);
            }
        }

        async function loadAllSeats() {
            try {
                const response = await fetch('/api/admin/seats');
                allSeatsData = await response.json();
                filterSeatsByFloor();
                document.getElementById('bookingsContainer').style.display = 'none';
            } catch (error) {
                showMessage('Error loading seats', 'error');
            }
        }

        function filterSeatsByFloor() {
            const floorFilter = document.getElementById('floorFilter').value;
            let filtered = allSeatsData;
            
            if (floorFilter !== 'all') {
                filtered = allSeatsData.filter(seat => seat.floor_number == floorFilter);
            }
            
            displayAdminSeats(filtered);
        }

        function displayAdminSeats(seats) {
            const container = document.getElementById('seatsContainer');
            document.getElementById('bookingsContainer').style.display = 'none';
            
            if (!seats || seats.length === 0) {
                container.innerHTML = '<p style="text-align:center; padding:40px;">No seats available</p>';
                return;
            }
            
            // Group by floor
            const floors = {};
            seats.forEach(seat => {
                if (!floors[seat.floor_number]) floors[seat.floor_number] = [];
                floors[seat.floor_number].push(seat);
            });
            
            let html = '';
            
            for (const [floorNum, floorSeats] of Object.entries(floors)) {
                const floorName = floorNum === '1' ? 'Ground Floor' : 'First Floor';
                
                // Group by table
                const tables = {};
                floorSeats.forEach(seat => {
                    if (!tables[seat.table_number]) tables[seat.table_number] = [];
                    tables[seat.table_number].push(seat);
                });
                
                html += `<div class="floor-section"><div class="floor-title">${floorName}</div><div class="tables-grid">`;
                
                const sortedTables = Object.keys(tables).sort((a, b) => a - b);
                
                for (const tableNum of sortedTables) {
                    const tableSeats = tables[tableNum];
                    tableSeats.sort((a, b) => a.seat_number - b.seat_number);
                    
                    const seat1 = tableSeats[0];
                    const seat2 = tableSeats[1];
                    const seat3 = tableSeats[2];
                    const seat4 = tableSeats[3];
                    
                    html += `
                        <div class="table-card">
                            <div class="table-number">Table ${tableNum}</div>
                            <div class="table-layout">
                                <div class="chair ${getSeatClassForAdmin(seat1)} chair-top-left" onclick="showSeatDetails(${seat1.id})">
                                    ${seat1.seat_number}
                                </div>
                                <div class="chair ${getSeatClassForAdmin(seat2)} chair-top-right" onclick="showSeatDetails(${seat2.id})">
                                    ${seat2.seat_number}
                                </div>
                                <div class="chair ${getSeatClassForAdmin(seat3)} chair-bottom-left" onclick="showSeatDetails(${seat3.id})">
                                    ${seat3.seat_number}
                                </div>
                                <div class="chair ${getSeatClassForAdmin(seat4)} chair-bottom-right" onclick="showSeatDetails(${seat4.id})">
                                    ${seat4.seat_number}
                                </div>
                                <div class="table-rectangle"></div>
                            </div>
                            ${getBookingDetailsForAdmin(tableSeats)}
                        </div>
                    `;
                }
                
                html += `</div></div>`;
            }
            
            container.innerHTML = html;
        }

        function getSeatClassForAdmin(seat) {
            if (!seat) return '';
            if (seat.status === 'available') return 'available';
            if (seat.verified) return 'verified';
            return 'booked';
        }

        function getBookingDetailsForAdmin(seats) {
            let details = '<div class="booking-details">';
            for (const seat of seats) {
                if (seat.status !== 'available' && seat.booking_id) {
                    const statusBadge = seat.verified ? '✅ Verified' : '⏳ Pending';
                    const bookingDate = seat.booking_date ? new Date(seat.booking_date).toLocaleDateString() : 'Today';
                    
                    details += `
                        <div class="booking-info">
                            <strong>Seat ${seat.seat_number}:</strong> ${statusBadge}<br>
                            <small>Student: ${seat.student_name || seat.student_id}</small><br>
                            <small>Booking Date: ${bookingDate}</small><br>
                            <small>Expires: ${seat.expires_at ? new Date(seat.expires_at).toLocaleTimeString() : 'N/A'}</small>
                            <div class="admin-buttons">
                                ${!seat.verified ? `<button class="btn-primary btn-small" onclick="verifyBooking(${seat.booking_id})">Verify</button>` : ''}
                                <button class="btn-danger btn-small" onclick="removeBooking(${seat.booking_id})">Remove</button>
                            </div>
                        </div>
                    `;
                }
            }
            details += '</div>';
            return details;
        }

        function showSeatDetails(seatId) {
            const seat = allSeatsData.find(s => s.id === seatId);
            if (seat && seat.status !== 'available') {
                const bookingDate = seat.booking_date ? new Date(seat.booking_date).toLocaleDateString() : 'Today';
                alert(`Seat: ${seat.seat_label}\nStatus: ${seat.verified ? 'Verified' : 'Booked'}\nStudent: ${seat.student_name || seat.student_id}\nBooking Date: ${bookingDate}\nExpires: ${seat.expires_at ? new Date(seat.expires_at).toLocaleString() : 'N/A'}`);
            } else {
                alert(`Seat ${seat?.seat_label} is available`);
            }
        }

        async function verifyBooking(bookingId) {
            if (!confirm('Verify this booking? This confirms the student has arrived.')) return;
            
            try {
                const response = await fetch(`/api/admin/verify/${bookingId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ admin_name: 'admin' })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('Booking verified successfully!', 'success');
                    loadAllSeats();
                    loadStatistics();
                } else {
                    showMessage('Error: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error verifying booking: ' + error.message, 'error');
            }
        }

        async function removeBooking(bookingId) {
            if (!confirm('Remove this booking? The seat will become available again.')) return;
            
            try {
                const response = await fetch(`/api/admin/booking/${bookingId}`, {
                    method: 'DELETE'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showMessage('Booking removed successfully!', 'success');
                    loadAllSeats();
                    loadStatistics();
                } else {
                    showMessage('Error: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Error removing booking: ' + error.message, 'error');
            }
        }

        async function loadAllBookings() {
            try {
                const response = await fetch('/api/admin/bookings');
                const bookings = await response.json();
                
                const container = document.getElementById('bookingsContainer');
                const seatsContainer = document.getElementById('seatsContainer');
                seatsContainer.style.display = 'none';
                container.style.display = 'block';
                
                if (!bookings || bookings.length === 0) {
                    container.innerHTML = '<p style="text-align:center; padding:40px;">No bookings found.</p><button onclick="loadAllSeats()" class="btn-primary">Back to Seats</button>';
                    return;
                }
                
                let tableHtml = `
                    <h3>All Bookings</h3>
                    <table class="bookings-table">
                        <thead>
                            <tr><th>ID</th><th>Student</th><th>Seat</th><th>Floor</th><th>Booking Date</th><th>Booked At</th><th>Expires</th><th>Status</th><th>Action</th></tr>
                        </thead>
                        <tbody>
                `;
                
                for (const booking of bookings) {
                    let statusText = '';
                    if (booking.verified) statusText = 'Verified ✓';
                    else if (booking.cancelled) statusText = 'Cancelled ✗';
                    else statusText = 'Pending ⏳';
                    
                    const bookingDate = booking.booking_date ? new Date(booking.booking_date).toLocaleDateString() : 'Today';
                    
                    tableHtml += `
                        <tr>
                            <td>${booking.id}</td>
                            <td>${booking.student_name}<br><small>(${booking.student_id})</small></td>
                            <td>${booking.seat_label}</td>
                            <td>${booking.floor_number === 1 ? 'Ground' : 'First'}</td>
                            <td><strong>${bookingDate}</strong></td>
                            <td><small>${new Date(booking.booking_time).toLocaleString()}</small></td>
                            <td><small>${new Date(booking.expires_at).toLocaleString()}</small></td>
                            <td>${statusText}</small></td>
                            <td>
                                ${!booking.verified && !booking.cancelled ? `<button class="btn-primary btn-small" onclick="verifyBooking(${booking.id})">Verify</button>` : ''}
                                <button class="btn-danger btn-small" onclick="removeBooking(${booking.id})">Remove</button>
                            </td>
                        </tr>
                    `;
                }
                
                tableHtml += `
                        </tbody>
                    </table>
                    <button onclick="loadAllSeats()" class="btn-primary" style="margin-top:20px;">Back to Seats View</button>
                `;
                
                container.innerHTML = tableHtml;
            } catch (error) {
                showMessage('Error loading bookings: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
